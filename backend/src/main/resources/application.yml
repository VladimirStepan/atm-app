
spring:
#  config:
#    import: optional:file:.env[.properties]
  application:
    name: atm-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/atm_service}
    username: ${DB_USERNAME:atm}
    password: ${DB_PASSWORD:atm}
  jackson:
    mapper:
      accept-case-insensitive-enums: true
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8084
